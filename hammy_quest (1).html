<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  min-height: 100vh;
  background: #F5A623;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace, sans-serif;
}

/* ── TABLET: full viewport width, no scroll ── */
#tablet-frame {
  background: #FF4D80;
  border-radius: 28px;
  padding: 14px;
  box-shadow: 0 0 0 7px #d6245a, 10px 10px 0 10px #a01840;
  width: calc(100vw - 48px);
  max-width: 1400px;
}
#tablet-inner {
  border-radius: 18px;
  overflow: hidden;
  background: #8fd2ff;
  /* two-column layout: scene left, quiz right */
  display: grid;
  grid-template-columns: 420px 1fr;
  grid-template-rows: 1fr;
  min-height: calc(100vh - 80px);
}

/* ── LEFT: sky + ground stacked ── */
#left-col {
  display: flex;
  flex-direction: column;
  position: relative;
  border-right: 5px solid #d6245a;
}
#sky {
  background: #8fd2ff;
  position: relative;
  flex: 1;
  overflow: hidden;
}
#ground {
  height: 54px;
  position: relative;
  flex-shrink: 0;
  background: #5B8A2E;
}
#ground::before {
  content:''; position:absolute; top:0; left:0; right:0; height:16px;
  background: repeating-linear-gradient(90deg,#6db33f 0,#6db33f 24px,#5B8A2E 24px,#5B8A2E 25px);
}
#ground::after {
  content:''; position:absolute; top:16px; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(90deg,#7a4e2a 0,#7a4e2a 24px,#6b4020 24px,#6b4020 25px);
}

/* ── HUD row at top of sky ── */
#hud {
  position: absolute;
  top: 12px; left: 12px; right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
}
.hud-box {
  background: rgba(0,0,0,0.6);
  border: 3px solid #fff;
  padding: 7px 14px;
  font-size: 12px; color: white; line-height: 1.9;
}

/* ── Level + speech side by side ── */
#info-row {
  position: absolute;
  top: 108px; left: 12px; right: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 20;
}
#level-banner {
  background: #F5A623;
  border: 4px solid #d6245a;
  padding: 7px 16px;
  font-size: 12px; color: #3d1a00;
  white-space: nowrap;
  flex-shrink: 0;
}
#speech {
  background: white;
  border: 3px solid #222;
  padding: 7px 20px 7px 14px;
  font-size: 11px; color: #222;
  white-space: nowrap;
  position: relative;
  flex-shrink: 0;
}
#speech::before {
  display: none;
}

/* ── Hamster ── */
#hamster-wrap {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  animation: gentleFloat 2.6s ease-in-out infinite;
}
@keyframes gentleFloat {
  0%,100% { transform: translateX(-50%) translateY(0px); }
  50%      { transform: translateX(-50%) translateY(-16px); }
}
#hamster-wrap.bounce  { animation: pixelBounce 0.6s ease forwards; }
#hamster-wrap.shake   { animation: pixelShake  0.5s ease forwards; }
#hamster-wrap.floating{ animation: gentleFloat 2.6s ease-in-out infinite; }
@keyframes pixelBounce {
  0%  { transform: translateX(-50%) translateY(0); }
  35% { transform: translateX(-50%) translateY(-30px); }
  70% { transform: translateX(-50%) translateY(-10px); }
  100%{ transform: translateX(-50%) translateY(0); }
}
@keyframes pixelShake {
  0%,100%{ transform: translateX(-50%); }
  25%    { transform: translateX(calc(-50% - 14px)); }
  75%    { transform: translateX(calc(-50% + 14px)); }
}
#hamster-img {
  width: 220px; height: 220px;
  image-rendering: pixelated; display: block;
}
#hamster-img.sad     { filter: brightness(0.8) saturate(0.5); }
#hamster-img.excited { filter: brightness(1.12) saturate(1.4) drop-shadow(0 0 10px #ffe066); }

/* ── RIGHT: quiz panel ── */
#quiz-panel {
  background: #1a0a00;
  padding: 24px 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}
.panel-topic {
  font-size: 12px; color: #F5A623; margin-bottom: 14px;
}
.panel-q {
  font-size: 15px; color: #fff;
  line-height: 2.3; margin-bottom: 18px;
  border-left: 5px solid #FF4D80; padding-left: 14px;
}
#q-opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 6px;
}
.pixel-btn {
  display: block; width: 100%;
  background: #2a1200; border: 3px solid #F5A623;
  color: #F5A623; font-family: 'Press Start 2P', monospace;
  font-size: 11px; padding: 14px 12px;
  cursor: pointer; text-align: left; line-height: 2;
}
.pixel-btn:hover   { background: #3d1a00; border-color: #fff; color: #fff; }
.pixel-btn.correct { background: #1a4d00; border-color: #6db33f; color: #b3ff80; }
.pixel-btn.wrong   { background: #4d0000; border-color: #ff4444; color: #ffaaaa; }
.pixel-btn:disabled{ cursor: default; }

.feedback-txt {
  font-size: 11px; color: #aaa;
  line-height: 2; margin: 12px 0; min-height: 22px;
}
.feedback-txt.ok  { color: #6db33f; }
.feedback-txt.bad { color: #ff6666; }

.next-pixel-btn {
  background: #F5A623; border: 3px solid #d6245a;
  color: #1a0a00; font-family: 'Press Start 2P', monospace;
  font-size: 12px; padding: 14px 28px;
  cursor: pointer; display: none; margin-top: 8px;
  align-self: flex-start;
}
.next-pixel-btn:hover { background: #ffc04d; }

.mute-btn {
  position: absolute; bottom: 16px; right: 18px;
  background: rgba(0,0,0,0.5); border: 3px solid #fff;
  color: #fff; font-family: 'Press Start 2P', monospace;
  font-size: 11px; padding: 6px 12px; cursor: pointer; z-index: 50;
}

/* ── OVERLAY ── */
#overlay-screen {
  position: absolute; inset: 0;
  background: rgba(26,10,0,0.9); z-index: 40;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px; text-align: center;
  border-radius: 18px;
}
.overlay-title {
  font-size: 26px; color: #F5A623;
  margin-bottom: 22px; line-height: 2;
  text-shadow: 3px 3px 0 #d6245a;
}
.overlay-sub { font-size: 13px; color: #fff; line-height: 2.6; margin-bottom: 28px; }
.big-pixel-btn {
  background: #FF4D80; border: 4px solid #fff;
  color: #fff; font-family: 'Press Start 2P', monospace;
  font-size: 16px; padding: 18px 44px;
  cursor: pointer; margin-top: 12px;
}
.big-pixel-btn:hover { background: #d6245a; }

/* ── FX ── */
.px-star {
  position: absolute; font-size: 30px; z-index: 60;
  pointer-events: none;
  animation: pxPop 0.9s ease-out forwards;
}
@keyframes pxPop {
  0%  { opacity:1; transform:translateY(0) scale(1); }
  100%{ opacity:0; transform:translateY(-80px) scale(1.6); }
}
#lvl-flash {
  position: absolute; inset: 0; background: #FFD700;
  opacity: 0; pointer-events: none; z-index: 35;
  border-radius: 18px;
}
#lvl-flash.flash { animation: lvlFlash 0.5s steps(3) forwards; }
@keyframes lvlFlash { 0%{opacity:0.65} 100%{opacity:0} }
</style>
</head>

        <div id="lvl-flash"></div>
      </div>
      <div id="ground"></div>
    </div>

    <!-- RIGHT COLUMN: quiz -->
    <div id="quiz-panel">
      <div class="panel-topic" id="q-topic">▌ TOPIC</div>
      <div class="panel-q"    id="q-text">Press START to play!</div>
      <div id="q-opts"></div>
      <div class="feedback-txt" id="q-fb"></div>
      <button class="next-pixel-btn" id="next-btn" onclick="nextQ()">NEXT ▶</button>
      <button class="mute-btn" id="mute-btn" onclick="toggleMute()">♪</button>
    </div>

    <!-- overlay covers whole grid -->
    <div id="overlay-screen">
      <div class="overlay-title">HAMMY'S WRITING QUEST</div>
      <div class="overlay-sub">
        5 questions on academic writing!<br>
        Earn 🥬 for correct answers!<br>
        3 wrong = game over!
      </div>
      <button class="big-pixel-btn" onclick="startGame()">▶ START</button>
      <div style="margin-top:18px;font-size:10px;color:#aaa">press start to play</div>
    </div>

<script>
const Qs = [
  {
    level:1, topic:"SENTENCE STRUCTURE",
    q:"Which sentence has the clearest, most effective structure?",
    opts:[
      "The report, which was written by the team that had been studying the effects of the policy for several years, was long.",
      "The team studied the policy for several years and produced a comprehensive report.",
      "A report was something that resulted from studying being done.",
      "Long was the report the team wrote after studying."
    ],
    ans:1,
    exp:"Direct subject-verb sentences beat long, tangled clauses. Avoid stacking subordinate clauses unnecessarily."
  },
  {
    level:2, topic:"ACTIVE VOICE",
    q:"Which uses active voice most effectively?",
    opts:[
      "The experiment was conducted by the research team.",
      "Results were found to be significant by the analysts.",
      "The research team conducted the experiment.",
      "It was determined that the findings were valid."
    ],
    ans:2,
    exp:"Active voice puts the subject first: 'The team conducted' is clearer than 'was conducted by the team'."
  },
  {
    level:3, topic:"SPLIT INFINITIVES",
    q:"Which correctly avoids splitting an infinitive?",
    opts:[
      "She wanted to carefully review each source.",
      "She wanted to review each source carefully.",
      "She hoped to really thoroughly check every source.",
      "She hoped to quickly and fully complete the analysis."
    ],
    ans:1,
    exp:"Keep 'to' and verb together: 'to review carefully', not 'to carefully review'."
  },
  {
    level:4, topic:"SENTENCE VARIETY & CONCISION",
    q:"Which passage best demonstrates sentence variety and concision?",
    opts:[
      "The study was long. The study was detailed. The study was important. The study took years.",
      "The study was conducted. It had many findings. The findings were numerous and varied in nature.",
      "The multi-year study was both extensive and detailed, yielding numerous and varied findings.",
      "A multi-year study produced extensive, varied findings."
    ],
    ans:3,
    exp:"Option D is concise and complete — no repetition or padding like 'both...and' or 'numerous and varied in nature'."
  },
  {
    level:5, topic:"MOOD & TONE",
    q:"Which sentence best maintains a formal academic tone?",
    opts:[
      "Honestly, the data is pretty convincing and you'd have to be blind not to see it.",
      "The data strongly supports the conclusion that intervention is necessary.",
      "The data is, like, really clear — intervention is obviously needed ASAP.",
      "Look, anyone can see that the data means we need to intervene now."
    ],
    ans:1,
    exp:"Formal tone is objective and measured. Avoid slang, hedges like 'honestly', and emotional language."
  }
];

let S={qi:0,hearts:3,lettuce:0,answered:false,muted:false};
let actx=null;
function audio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,t='square',v=0.1){if(S.muted)return;try{const c=audio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndCorrect(){[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.2),i*100));}
function sndWrong(){[330,220].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'sawtooth',0.08),i*120));}
function sndLevelUp(){[392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18),i*80));}
function sndStart(){[261,330,392,523].forEach((f,i)=>setTimeout(()=>beep(f,0.15),i*90));}
function toggleMute(){S.muted=!S.muted;document.getElementById('mute-btn').textContent=S.muted?'✕':'♪';}

function setMood(mood){
  const img=document.getElementById('hamster-img');
  img.className=mood==='happy'?'':mood;
}
function resumeFloat(){document.getElementById('hamster-wrap').className='floating';}
function spawnStar(emoji,x,y){
  const el=document.createElement('div');el.className='px-star';el.textContent=emoji;
  el.style.left=(x||160+Math.random()*80)+'px';
  el.style.top=(y||60+Math.random()*80)+'px';
  document.getElementById('sky').appendChild(el);
  setTimeout(()=>el.remove(),1000);
}
function levelFlash(){
  const f=document.getElementById('lvl-flash');
  f.classList.remove('flash');void f.offsetWidth;f.classList.add('flash');
}
function updateHUD(){
  document.getElementById('hearts-hud').innerHTML='❤️'.repeat(S.hearts)+'🖤'.repeat(3-S.hearts);
  document.getElementById('lett-hud').innerHTML='🥬'.repeat(S.lettuce)+'⬜'.repeat(Math.max(0,3-S.lettuce));
  document.getElementById('q-num').textContent=Math.min(5,S.qi+1);
}
function renderQ(){
  S.answered=false; updateHUD();
  const q=Qs[S.qi];
  document.getElementById('q-topic').textContent='▌ LVL '+q.level+' — '+q.topic;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-fb').textContent='';
  document.getElementById('q-fb').className='feedback-txt';
  const isLast=S.qi===Qs.length-1;
  document.getElementById('next-btn').textContent=isLast?'FINISH! ▶':'NEXT ▶';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('speech').textContent='◀ Think carefully!';
  setMood('happy');
  const opts=document.getElementById('q-opts');opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='pixel-btn';
    b.textContent=String.fromCharCode(65+i)+'. '+o;
    b.onclick=()=>answer(i);
    opts.appendChild(b);
  });
}
function answer(i){
  if(S.answered)return;
  S.answered=true;
  const q=Qs[S.qi];
  const btns=document.querySelectorAll('.pixel-btn');
  const hw=document.getElementById('hamster-wrap');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  if(i===q.ans){
    btns[i].classList.add('correct');
    S.lettuce=Math.min(5,S.lettuce+1);
    document.getElementById('q-fb').className='feedback-txt ok';
    document.getElementById('q-fb').textContent='✔ '+q.exp;
    sndCorrect();setMood('excited');
    document.getElementById('speech').textContent='◀ Yay! Lettuce! ★';
    hw.className='bounce';setTimeout(resumeFloat,700);
    spawnStar('🥬',180,100);spawnStar('⭐',260,70);
    levelFlash();
  }else{
    btns[i].classList.add('wrong');
    S.hearts--;
    document.getElementById('q-fb').className='feedback-txt bad';
    document.getElementById('q-fb').textContent='✘ '+q.exp;
    sndWrong();setMood('sad');
    document.getElementById('speech').textContent='◀ Ouch! Try harder!';
    hw.className='shake';setTimeout(resumeFloat,700);
    spawnStar('💔',210,90);
    updateHUD();
    if(S.hearts<=0){setTimeout(()=>showEnd(false),1700);return;}
  }
  updateHUD();
  document.getElementById('next-btn').style.display='inline-block';
}
function nextQ(){
  S.qi++;
  if(S.qi>=Qs.length){showEnd(true);return;}
  sndLevelUp();renderQ();
}
function showEnd(win){
  const score=S.lettuce;
  const ov=document.getElementById('overlay-screen');
  ov.style.display='flex';
  ov.innerHTML=win
    ?`<div class="overlay-title" style="color:#FFD700">DONE! ${score}/5 ⭐</div>
      <div class="overlay-sub" style="color:#aaffaa">You got ${score} lettuce!<br>${score===5?'Perfect score! 🏆':score>=3?'Great job! 🥬':'Keep practising! 💪'}</div>
      <button class="big-pixel-btn" onclick="restartGame()">▶ PLAY AGAIN</button>`
    :`<div class="overlay-title" style="color:#ff4444">GAME OVER</div>
      <div class="overlay-sub">Hammy lost all hearts! 💔<br>Practice more and try again!</div>
      <button class="big-pixel-btn" onclick="restartGame()">▶ RETRY</button>`;
  if(win){sndLevelUp();spawnStar('🏆',210,120);}
}
function restartGame(){
  S={qi:0,hearts:3,lettuce:0,answered:false,muted:S.muted};
  document.getElementById('overlay-screen').style.display='flex';
  document.getElementById('overlay-screen').innerHTML=`
    <div class="overlay-title">HAMMY'S WRITING QUEST</div>
    <div class="overlay-sub">5 questions on academic writing!<br>Earn 🥬 for correct answers!<br>3 wrong = game over!</div>
    <button class="big-pixel-btn" onclick="startGame()">▶ START</button>
    <div style="margin-top:18px;font-size:10px;color:#aaa">press start to play</div>`;
  updateHUD();setMood('happy');
}
function startGame(){
  S={qi:0,hearts:3,lettuce:0,answered:false,muted:S.muted};
  document.getElementById('overlay-screen').style.display='none';
  sndStart();setMood('happy');renderQ();
}
window.addEventListener('load',()=>{updateHUD();});
</script>
